<main class="min-h-screen bg-background text-foreground">
  <nav class="border-b border-ink/15">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-6 py-4">
      <a href="/" class="font-display text-xl tracking-tight">
        Olho na Cota<span class="text-money">.</span>
      </a>
      <span class="text-xs uppercase tracking-[0.2em] text-muted-foreground hidden sm:block">
        Transparência parlamentar
      </span>
    </div>
  </nav>

  <app-money-banner 
    [loading]="despesas().length === 0"
    [total]="totalMes()"
    [mesRef]="mesRef()"
    [qtdDeputados]="despesas().length"
  />

  <app-deputados-list [despesas]="despesas()" />

  <footer class="border-t border-ink/15 bg-secondary/40">
    <div class="mx-auto max-w-6xl px-6 py-10 text-sm text-muted-foreground">
      <p>
        Dados públicos da Câmara dos Deputados. Este projeto não tem vínculo institucional e existe
        apenas para facilitar a leitura das despesas parlamentares.
      </p>
    </div>
  </footer>
</main>

<router-outlet />
